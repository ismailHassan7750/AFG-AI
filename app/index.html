<!DOCTYPE html>
<html lang="ps">
<head>
<meta charset="UTF-8">

<title>AFG AI</title>

<style>
body{
    background:#111;
    color:white;
    font-family:Arial, sans-serif;
    margin:0;
}

.header{
    background:#222;
    padding:15px;
    text-align:center;
    font-size:22px;
}

.chat{
    height:70vh;
    padding:15px;
    overflow-y:auto;
}

.user{
    background:#0066ff;
    padding:10px;
    border-radius:15px;
    margin:10px;
    text-align:right;
}

.ai{
    background:#333;
    padding:10px;
    border-radius:15px;
    margin:10px;
    text-align:left;
}

.box{
    display:flex;
    padding:10px;
    background:#222;
}

input{
    flex:1;
    padding:12px;
    border-radius:10px;
    border:none;
}

button{
    margin-left:5px;
    padding:12px;
    border-radius:10px;
}
</style>

</head>

<body>

<div class="header">
🤖 AFG AI
</div>

<div class="chat" id="chat">
<div class="ai">
سلام 👋 زه AFG AI یم.<br>
د اسماعیل حسن لخوا جوړ شوی یم.
</div>
</div>

<div class="box">

<input id="msg" placeholder="پیغام ولیکه">

<button onclick="send()">➤</button>

</div>


<script>

function send(){

let input=document.getElementById("msg");
let text=input.value;

if(text=="") return;


let chat=document.getElementById("chat");


chat.innerHTML += 
'<div class="user">'+text+'</div>';


chat.innerHTML += 
'<div class="ai">🤖 AFG AI: ستا پیغام مې واورېد: '+text+'</div>';


input.value="";

chat.scrollTop=chat.scrollHeight;

}

</script>

</body>
</html>
